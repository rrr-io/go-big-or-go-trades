name: OCI A1 retry

# Keeps trying to launch the Always Free Ampere A1 instance until Oracle has
# capacity. Runs on a schedule; once the instance exists, every run just skips.
# Fighting!!!!!!!!!!!! You can do ittttttttttttttttttt OCI
on:
  schedule:
    - cron: "0 */6 * * *"     # restart the long-running attempt every 6 hours
  workflow_dispatch:           # manual run button

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 350       # stay under GitHub's 6h job limit
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
      COMPARTMENT_ID: ${{ secrets.OCI_TENANCY_OCID }}
      SUBNET_ID: ${{ secrets.OCI_SUBNET_OCID }}
      SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
      NAME: rio-server
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Keep trying until capacity is available
        run: |
          set -e

          # Skip if a non-terminated instance with this name already exists.
          COUNT=$(oci compute instance list -c "$COMPARTMENT_ID" --display-name "$NAME" --all 2>/dev/null \
            | jq -r '[.data[]? | select(."lifecycle-state" != "TERMINATED")] | length' 2>/dev/null || true)
          COUNT=${COUNT:-0}
          echo "Non-terminated instances named '$NAME': $COUNT"
          if [ "$COUNT" != "0" ]; then echo "Already exists — nothing to do."; exit 0; fi

          AD=$(oci iam availability-domain list -c "$COMPARTMENT_ID" --query 'data[0].name' --raw-output)
          IMAGE_ID=$(oci compute image list -c "$COMPARTMENT_ID" \
            --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output)
          echo "$SSH_PUBLIC_KEY" > /tmp/id.pub
          echo "AD=$AD"

          END=$(( $(date +%s) + 18000 ))   # keep retrying ~5h, then let the run end
          ATTEMPT=0
          while [ "$(date +%s)" -lt "$END" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            if OUT=$(oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "$COMPARTMENT_ID" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":1,"memoryInGBs":6}' \
              --image-id "$IMAGE_ID" \
              --subnet-id "$SUBNET_ID" \
              --assign-public-ip true \
              --display-name "$NAME" \
              --ssh-authorized-keys-file /tmp/id.pub \
              --wait-for-state RUNNING 2>&1); then
              ID=$(oci compute instance list -c "$COMPARTMENT_ID" --display-name "$NAME" \
                --lifecycle-state RUNNING --query 'data[0].id' --raw-output)
              echo "==== PUBLIC IP ===="
              oci compute instance list-vnics --instance-id "$ID" \
                --query 'data[0]."public-ip"' --raw-output
              exit 0
            fi
            if echo "$OUT" | grep -qi "TooManyRequests"; then
              echo "$(date +%T) tentativo $ATTEMPT: 429 rate limit, pausa 15m"; sleep 900
            elif echo "$OUT" | grep -qi "Out of host capacity"; then
              echo "$(date +%T) tentativo $ATTEMPT: out of capacity, riprovo tra 5m"; sleep 300
            else
              echo "Errore inatteso:"; echo "$OUT"; exit 1
            fi
          done
          echo "Budget di tempo esaurito — il prossimo run programmato continuerà."
          exit 0