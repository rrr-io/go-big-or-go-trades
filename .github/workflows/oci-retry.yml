name: OCI A1 retry

# Keeps trying to launch the Always Free Ampere A1 instance until Oracle has
# capacity. Runs on a schedule; once the instance exists, every run just skips.
# Fighting!!!!!!!!!!!! You can do ittttttttttttttttttt OCI
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # also lets you run it by hand from the Actions tab

jobs:
  launch:
    runs-on: ubuntu-latest
    env:
      # --- auth (from repo secrets) ---
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
      # --- target ---
      COMPARTMENT_ID: ${{ secrets.OCI_TENANCY_OCID }}   # root compartment = tenancy
      SUBNET_ID: ${{ secrets.OCI_SUBNET_OCID }}
      SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
      NAME: rio-server
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Launch (or skip if it already exists)
        run: |
          set -e
          # Skip only if a non-terminated instance with this name really exists.
          # Use jq and default to 0, so an empty result is treated as "none"
          # (the old --query length(...) returned "" on empty -> false positive).
          COUNT=$(oci compute instance list \
            --compartment-id "$COMPARTMENT_ID" --display-name "$NAME" --all 2>/dev/null \
            | jq -r '[.data[]? | select(."lifecycle-state" != "TERMINATED")] | length' 2>/dev/null || true)
          COUNT=${COUNT:-0}
          echo "Non-terminated instances named '$NAME': $COUNT"
          if [ "$COUNT" != "0" ]; then
            echo "Instance already exists — nothing to do."
            exit 0
          fi

          AD=$(oci iam availability-domain list -c "$COMPARTMENT_ID" \
            --query 'data[0].name' --raw-output)
          IMAGE_ID=$(oci compute image list -c "$COMPARTMENT_ID" \
            --operating-system "Canonical Ubuntu" --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output)
          echo "AD=$AD"
          echo "$SSH_PUBLIC_KEY" > /tmp/id.pub

          set +e
          OUT=$(oci compute instance launch \
            --availability-domain "$AD" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":1,"memoryInGBs":6}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "$SUBNET_ID" \
            --assign-public-ip true \
            --display-name "$NAME" \
            --ssh-authorized-keys-file /tmp/id.pub \
            --wait-for-state RUNNING 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -eq 0 ]; then
            ID=$(oci compute instance list -c "$COMPARTMENT_ID" --display-name "$NAME" \
              --lifecycle-state RUNNING --query 'data[0].id' --raw-output)
            echo "==== PUBLIC IP ===="
            oci compute instance list-vnics --instance-id "$ID" \
              --query 'data[0]."public-ip"' --raw-output
            exit 0
          fi
          # No capacity / rate-limited: exit success so the run isn't marked failed.
          if echo "$OUT" | grep -qi "Out of host capacity\|TooManyRequests"; then
            echo "No capacity yet — will retry on the next scheduled run."
            exit 0
          fi
          echo "Unexpected error — check the secrets/config."
          exit 1